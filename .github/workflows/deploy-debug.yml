name: Deploy Debug Test

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Test FTP Connection
      run: |
        echo "=== FTP DEBUG INFO ==="
        echo "Server: '${{ secrets.FTP_SERVER }}'"
        echo "Username: ${{ secrets.FTP_USERNAME }}"
        echo "Remote Dir: '${{ secrets.FTP_REMOTE_DIR }}'"
        echo "===================="

        # Test with longer timeouts
        echo "Testing with longer timeouts..."
        curl -v --connect-timeout 30 --max-time 60 \
          "ftp://ch64989:Buezu1909$@buezu09.ch/" \
          --list-only || echo "TIMEOUT TEST FAILED"
        
        # Test with passive FTP
        echo "Testing with passive FTP..."
        curl -v --connect-timeout 30 --max-time 60 --ftp-pasv \
          "ftp://ch64989:Buezu1909$@buezu09.ch/" \
          --list-only || echo "PASV TEST FAILED"
