name: Deploy Debug Test

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  debug:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Test FTP Connection
      run: |
        echo "=== FTP DEBUG INFO ==="
        echo "Server: ${{ secrets.FTP_SERVER }}"
        echo "Username: ${{ secrets.FTP_USERNAME }}"
        echo "Remote Dir: ${{ secrets.FTP_REMOTE_DIR }}"
        echo "Port Secret: '${{ secrets.FTP_PORT }}'"
        echo "===================="
        
        # Test connection with hardcoded port 21
        echo "Testing FTP connection with port 21..."
        curl -v "ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }}:21${{ secrets.FTP_REMOTE_DIR }}" \
          --list-only || echo "CONNECTION FAILED with port 21"
        
        echo "Local files:"
        ls -la
        
        # Create test file
        echo "test deployment $(date)" > test-deployment.txt
        
        echo "Uploading test file with port 21..."
        curl -v -T test-deployment.txt \
          "ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }}:21${{ secrets.FTP_REMOTE_DIR }}test-deployment.txt" \
          --ftp-create-dirs || echo "UPLOAD FAILED with port 21"
        
        echo "Verifying test file with port 21..."
        curl -v "ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }}:21${{ secrets.FTP_REMOTE_DIR }}" \
          --list-only || echo "VERIFICATION FAILED with port 21"
