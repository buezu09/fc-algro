name: Deploy Debug Test

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  debug:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Test FTP Connection
      run: |
        echo "=== FTP DEBUG INFO ==="
        echo "Server: ${{ secrets.FTP_SERVER }}"
        echo "Username: ${{ secrets.FTP_USERNAME }}"
        echo "Remote Dir: '${{ secrets.FTP_REMOTE_DIR }}'"
        echo "===================="
        
        # Test connection with minimal URL
        echo "Testing FTP connection to root..."
        curl -v "ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }}/" \
          --list-only || echo "CONNECTION FAILED to root"
        
        echo "Local files:"
        ls -la
        
        # Create test file
        echo "test deployment $(date)" > test-deployment.txt
        
        echo "Uploading test file to root..."
        curl -v -T test-deployment.txt \
          "ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }}/test-deployment.txt" \
          --ftp-create-dirs || echo "UPLOAD FAILED to root"
        
        echo "Verifying test file in root..."
        curl -v "ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }}/" \
          --list-only || echo "VERIFICATION FAILED in root"
