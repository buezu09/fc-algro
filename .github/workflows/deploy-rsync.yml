name: Deploy via Rsync

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: ctype, iconv, intl, pdo, pdo_mysql, gd, zip, dom, filter, gd, iconv, json, mbstring, pdo
        coverage: none
        
    - name: Copy .env file
      run: cp .env .env.local
      
    - name: Get Composer Cache Directory
      id: composer-cache
      run: |
        echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        
    - name: Cache Composer dependencies
      uses: actions/cache@v3
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-
          
    - name: Install Composer dependencies
      run: composer install --no-dev --optimize-autoloader --no-progress --no-interaction
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'yarn'
        
    - name: Install Yarn dependencies
      run: yarn install --frozen-lockfile --production
      
    - name: Build assets
      run: yarn build
      
    - name: Clear Symfony cache
      run: php bin/console cache:clear --env=prod --no-warmup
      
    - name: Warmup Symfony cache
      run: php bin/console cache:warmup --env=prod
      
    - name: Install rsync
      run: sudo apt-get update && sudo apt-get install -y rsync
      
    - name: Deploy via rsync
      run: |
        # Create exclude file
        cat > exclude.txt << EOF
        .git
        .github
        node_modules
        tests
        .env.dev
        .env.test
        package-lock.json
        yarn.lock
        phpunit.dist.xml
        compose.yaml
        .docker
        .idea
        .DS_Store
        EOF
        
        # Deploy using rsync with password authentication
        rsync -avz --delete --exclude-from=exclude.txt \
          -e "sshpass -p '${{ secrets.SERVER_PASSWORD }}' ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT || 22 }}" \
          ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.REMOTE_PATH || '/var/www/symfony' }}
          
    - name: Post-deployment commands
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          cd ${{ secrets.REMOTE_PATH || '/var/www/symfony' }}
          
          # Set proper permissions
          chown -R www-data:www-data var
          chmod -R 755 var
          
          # Run database migrations if needed
          php bin/console doctrine:migrations:migrate --env=prod --no-interaction
          
          echo "Rsync deployment completed!"
