name: Deploy Simple Curl

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Remove development files
      run: |
        rm -rf .git .github tests
        rm -f package-lock.json yarn.lock phpunit.dist.xml compose.yaml
        rm -f webpack.config.js .yarnrc.yml .editorconfig .DS_Store
        rm -rf .idea .docker
        # Keep vendor directory - needed for production
        
    - name: Upload files via simple curl
      run: |
        echo "Starting simple FTP upload..."
        echo "Server: ${{ secrets.FTP_SERVER }}"
        echo "Port: ${{ secrets.FTP_PORT || 21 }}"
        echo "Username: ${{ secrets.FTP_USERNAME }}"
        echo "Remote Dir: ${{ secrets.FTP_REMOTE_DIR }}"
        
        # Test basic connection and list files
        echo "Testing connection and listing remote directory..."
        curl -v --connect-timeout 10 \
          "ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }}:${{ secrets.FTP_PORT || 21 }}${{ secrets.FTP_REMOTE_DIR }}" \
          --list-only || echo "Connection test failed"
        
        # List local files to upload
        echo "Local files to upload:"
        ls -la
        
        # Upload single files first
        for file in *; do
          if [ -f "$file" ]; then
            echo "Uploading: $file to ${{ secrets.FTP_REMOTE_DIR }}$file"
            curl -v --connect-timeout 30 --max-time 300 -T "$file" \
              "ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }}:${{ secrets.FTP_PORT || 21 }}${{ secrets.FTP_REMOTE_DIR }}$file" \
              --ftp-create-dirs || echo "Failed to upload $file"
          fi
        done
        
        # Verify upload by listing remote directory again
        echo "Verifying upload - listing remote directory:"
        curl -v --connect-timeout 10 \
          "ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }}:${{ secrets.FTP_PORT || 21 }}${{ secrets.FTP_REMOTE_DIR }}" \
          --list-only || echo "Cannot list remote directory"
        
        echo "Upload completed!"
