name: Deploy via Docker

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./.docker/apache/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/fc-algro:latest
          ${{ secrets.DOCKER_USERNAME }}/fc-algro:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to server via Docker API
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          # Pull latest image
          docker pull ${{ secrets.DOCKER_USERNAME }}/fc-algro:latest
          
          # Stop and remove old container
          docker stop fc-algro || true
          docker rm fc-algro || true
          
          # Run new container
          docker run -d \
            --name fc-algro \
            --restart unless-stopped \
            -p 8080:80 \
            -e APP_ENV=prod \
            -e APP_DEBUG=0 \
            ${{ secrets.DOCKER_USERNAME }}/fc-algro:latest
          
          echo "Docker deployment completed!"
