name: Deploy via cURL

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Remove development files
      run: |
        rm -rf .git .github tests
        rm -f package-lock.json yarn.lock phpunit.dist.xml compose.yaml
        rm -f webpack.config.js .yarnrc.yml .editorconfig .DS_Store
        rm -rf .idea .docker
        
    - name: Install ncftp
      run: sudo apt-get update && sudo apt-get install -y ncftp
      
    - name: Deploy via ncftpput
      run: |
        ncftpput -R -v -u "${{ secrets.FTP_USERNAME }}" -p "${{ secrets.FTP_PASSWORD }}" \
        -P ${{ secrets.FTP_PORT || 21 }} \
        ${{ secrets.FTP_SERVER }} ${{ secrets.FTP_REMOTE_DIR || '/' }} ./*
